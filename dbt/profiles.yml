swing_trading_system:
  target: dev
  outputs:
    dev:
      type: postgres
      host: "{{ env_var('POSTGRES_HOST', env_var('INFRA_HOST', 'localhost')) }}"
      port: "{{ env_var('POSTGRES_PORT', '55432') | int }}"
      user: "{{ env_var('POSTGRES_USER', 'quant') }}"
      password: "{{ env_var('POSTGRES_PASSWORD', 'quant') }}"
      dbname: "{{ env_var('POSTGRES_DB', 'quant') }}"
      schema: swing_mart
      threads: 2
