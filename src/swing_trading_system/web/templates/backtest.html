{% extends "base.html" %}
{% block content %}
<section>
  <h2>Run Backtest</h2>
  <form method="post" action="/backtest">
    <label>Strategy
      <select name="strategy_id">
        <option value="breakout">breakout</option>
        <option value="pullback">pullback</option>
      </select>
    </label>
    <label>Start <input type="date" name="start_date" required /></label>
    <label>End <input type="date" name="end_date" required /></label>
    <label>Initial Capital <input type="number" name="initial_capital" value="100000" required /></label>
    <label>Save <input type="checkbox" name="save" value="true" /></label>
    <button type="submit">Run</button>
  </form>
</section>
{% if result %}
<section>
  <h2>Result</h2>
  <pre>{{ result }}</pre>
</section>
{% endif %}
{% endblock %}
