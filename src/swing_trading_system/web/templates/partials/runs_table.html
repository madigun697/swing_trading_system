{% if recent_runs %}
<div class="table-wrap">
  <table>
    <thead><tr><th>Run ID</th><th class="numeric">Trades</th><th class="numeric">Total PnL</th><th>Start</th><th>End</th></tr></thead>
    <tbody>
    {% for run in recent_runs %}
      <tr>
        <td><a class="code-chip" href="{{ url_for('backtest_detail', run_id=run.run_id) }}">{{ run.run_id }}</a></td>
        <td class="numeric">{{ run.trade_count }}</td>
        <td class="numeric">{{ run.total_pnl }}</td>
        <td>{{ run.start_date }}</td>
        <td>{{ run.end_date }}</td>
      </tr>
    {% endfor %}
    </tbody>
  </table>
</div>
{% else %}
<div class="empty-state">No backtest runs yet. Run <code>uv run swing-system run-backtest</code>.</div>
{% endif %}
