services:
  web:
    build:
      context: .
      dockerfile: infra/web/Dockerfile
    env_file:
      - .env
    environment:
      INFRA_HOST: ${INFRA_HOST:-localhost}
      POSTGRES_HOST: ${INFRA_HOST:-localhost}
      POSTGRES_PORT: ${POSTGRES_PORT:-55432}
      SWING_WEB_PORT: ${SWING_WEB_PORT:-8401}
    ports:
      - "${SWING_WEB_PORT:-8401}:${SWING_WEB_PORT:-8401}"
    volumes:
      - ./:/app
    extra_hosts:
      - "host.docker.internal:host-gateway"
    command: >
      uv run uvicorn swing_trading_system.web.app:app
      --host 0.0.0.0
      --port ${SWING_WEB_PORT:-8401}
      --reload

  db-init:
    build:
      context: .
      dockerfile: infra/web/Dockerfile
    env_file:
      - .env
    environment:
      INFRA_HOST: ${INFRA_HOST:-localhost}
      POSTGRES_HOST: ${INFRA_HOST:-localhost}
      POSTGRES_PORT: ${POSTGRES_PORT:-55432}
    volumes:
      - ./:/app
    extra_hosts:
      - "host.docker.internal:host-gateway"
    command: uv run swing-system init-db
    profiles: ["ops"]

  end-of-day:
    build:
      context: .
      dockerfile: infra/web/Dockerfile
    env_file:
      - .env
    environment:
      INFRA_HOST: ${INFRA_HOST:-localhost}
      POSTGRES_HOST: ${INFRA_HOST:-localhost}
      POSTGRES_PORT: ${POSTGRES_PORT:-55432}
    volumes:
      - ./:/app
    extra_hosts:
      - "host.docker.internal:host-gateway"
    command: uv run swing-system end-of-day --save --send-alerts
    profiles: ["ops"]
